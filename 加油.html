<!DOCTYPE html>
<html lang="zh-CN" data-theme="light" data-font-scale="1">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人生模拟 · 中国科大到生命终章</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root {
            --font-scale: 1;
            --bg: #fdf8f0;
            --bg-secondary: #faf3e6;
            --bg-card: #fffdf8;
            --bg-header: #fef9f3;
            --bg-modal: #fffefb;
            --bg-input: #fffdf7;
            --bg-hover: #fefaf2;
            --bg-overlay: rgba(60, 40, 20, 0.35);
            --text: #3d3228;
            --text-secondary: #5a4a38;
            --text-light: #6b5e51;
            --text-muted: #9b8c7b;
            --text-heading: #4a3520;
            --accent: #c4944c;
            --accent-hover: #a87a3a;
            --accent-light: #f0e0c8;
            --accent-bg: #fdf0db;
            --accent-text: #8b6914;
            --border: #e8dcc8;
            --border-light: #f0e8d8;
            --border-focus: #c4944c;
            --shadow: 0 2px 12px rgba(60, 40, 20, 0.06);
            --shadow-sm: 0 1px 4px rgba(60, 40, 20, 0.04);
            --shadow-md: 0 4px 20px rgba(60, 40, 20, 0.08);
            --shadow-lg: 0 8px 32px rgba(60, 40, 20, 0.10);
            --shadow-xl: 0 16px 48px rgba(60, 40, 20, 0.14);
            --radius: 14px;
            --radius-sm: 8px;
            --radius-xs: 5px;
            --font-serif: 'Georgia', 'Noto Serif SC', 'STSong', 'SimSun', 'Songti SC', serif;
            --font-sans: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            --danger: #c44a4a;
            --danger-hover: #a83333;
            --danger-bg: #fef5f5;
            --danger-border: #f5d5d5;
            --success: #5a9e6f;
            --success-bg: #f2f9f4;
            --warning: #d4a85c;
            --warning-bg: #fef9f2;
            --scrollbar-thumb: #dcc8a8;
            --scrollbar-thumb-hover: #c4a880;
            --scrollbar-track: transparent;
            --divider: linear-gradient(90deg, transparent, #f0e8d8, transparent);
            --progress-completed: #5a9e6f;
            --progress-current: #c4944c;
            --progress-upcoming: #d5ccbc;
            --radar-grid: #e8dcc8;
            --radar-grid-bg: #fdf8f0;
            --radar-fill: rgba(196, 148, 76, 0.18);
            --radar-stroke: #c4944c;
            --radar-dot: #c4944c;
            --radar-dot-border: #fffdf8;
            --radar-label: #6b5e51;
            --radar-axis: #e8dcc8;
            --rel-father: #c4944c;
            --rel-mother: #d4849c;
            --rel-partner: #c46a6a;
            --rel-friends: #6a9fd4;
            --rel-children: #7ab88a;
        }
        [data-theme="dark"] {
            --bg: #1a1510;
            --bg-secondary: #151210;
            --bg-card: #1e1812;
            --bg-header: #1c1610;
            --bg-modal: #221c15;
            --bg-input: #241d15;
            --bg-hover: #282018;
            --bg-overlay: rgba(8, 6, 4, 0.68);
            --text: #d4c8b8;
            --text-secondary: #c4b8a8;
            --text-light: #b0a494;
            --text-muted: #8a7c6c;
            --text-heading: #d8ccbc;
            --accent: #d4a85c;
            --accent-hover: #c49848;
            --accent-light: #3a2e1c;
            --accent-bg: #3a2e1c;
            --accent-text: #d4a85c;
            --border: #3a3028;
            --border-light: #322a22;
            --border-focus: #d4a85c;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.28);
            --shadow-sm: 0 1px 4px rgba(0, 0, 0, 0.30);
            --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.34);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.38);
            --shadow-xl: 0 16px 48px rgba(0, 0, 0, 0.44);
            --danger: #d46a6a;
            --danger-hover: #c44a4a;
            --danger-bg: #2a1818;
            --danger-border: #4a2828;
            --success: #7ab88a;
            --success-bg: #1a2a1e;
            --warning: #d4a85c;
            --warning-bg: #2a2418;
            --scrollbar-thumb: #4a3a2a;
            --scrollbar-thumb-hover: #5a4a38;
            --divider: linear-gradient(90deg, transparent, #3a3028, transparent);
            --progress-completed: #7ab88a;
            --progress-current: #d4a85c;
            --progress-upcoming: #4a4038;
            --radar-grid: #3a3028;
            --radar-grid-bg: #1e1812;
            --radar-fill: rgba(212, 168, 92, 0.22);
            --radar-stroke: #d4a85c;
            --radar-dot: #d4a85c;
            --radar-dot-border: #1a1510;
            --radar-label: #b0a494;
            --radar-axis: #3a3028;
            --rel-father: #d4a85c;
            --rel-mother: #d4849c;
            --rel-partner: #d46a6a;
            --rel-friends: #6a9fd4;
            --rel-children: #7ab88a;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }
        html {
            scroll-behavior: smooth
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-sans);
            line-height: 1.7;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            transition: background .4s ease, color .4s ease;
            font-size: calc(1rem * var(--font-scale))
        }
        #root {
            min-height: 100vh;
            display: flex;
            flex-direction: column
        }
        ::-webkit-scrollbar {
            width: 6px
        }
        ::-webkit-scrollbar-track {
            background: var(--scrollbar-track)
        }
        ::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 3px
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--scrollbar-thumb-hover)
        }
        button {
            font-family: var(--font-sans);
            cursor: pointer;
            border: none;
            background: none;
            transition: var(--transition-fast);
            font-size: inherit
        }
        button:disabled {
            opacity: .5;
            cursor: not-allowed;
            pointer-events: none
        }
        input, textarea, select {
            font-family: var(--font-sans);
            transition: var(--transition-fast);
            font-size: inherit
        }
        a {
            color: var(--accent);
            text-decoration: none
        }
        a:hover {
            text-decoration: underline
        }

        .setup-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            background: linear-gradient(180deg, var(--bg) 0%, var(--bg-secondary) 50%, var(--bg) 100%)
        }
        .setup-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 3rem 2.5rem;
            max-width: 560px;
            width: 100%;
            box-shadow: var(--shadow-lg);
            text-align: center;
            position: relative
        }
        .setup-card h1 {
            font-family: var(--font-serif);
            font-size: 1.8rem;
            color: var(--text-heading);
            margin-bottom: .5rem;
            letter-spacing: .04em;
            font-weight: 400
        }
        .setup-card .subtitle {
            color: var(--text-muted);
            font-size: .95rem;
            margin-bottom: 2rem;
            font-style: italic
        }
        .setup-card .decor-line {
            width: 60px;
            height: 2px;
            background: var(--accent-light);
            margin: 0 auto 1.5rem;
            border-radius: 2px
        }
        .setup-card label {
            display: block;
            text-align: left;
            font-size: .85rem;
            color: var(--text-light);
            margin-bottom: .4rem;
            letter-spacing: .02em
        }
        .setup-card input {
            width: 100%;
            padding: .85rem 1rem;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: .95rem;
            background: var(--bg-input);
            color: var(--text);
            letter-spacing: .01em;
            margin-bottom: 1rem;
        }
        .setup-card input:focus {
            outline: none;
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(196, 148, 76, .12);
            background: var(--bg-card)
        }
        .btn-primary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: .4rem;
            padding: .85rem 1.6rem;
            background: var(--accent);
            color: #fffdf7;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            letter-spacing: .04em;
            font-weight: 500;
            transition: var(--transition)
        }
        .btn-primary:hover {
            background: var(--accent-hover);
            box-shadow: 0 4px 16px rgba(168, 122, 58, .3);
            transform: translateY(-1px)
        }
        .btn-primary:active {
            transform: translateY(0)
        }
        .game-container {
            max-width: 820px;
            margin: 0 auto;
            padding: .8rem 1.2rem 3rem;
            width: 100%
        }
        .narrative-card {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            padding: 2rem;
            margin-bottom: 1.2rem;
            box-shadow: var(--shadow);
            min-height: 100px;
            position: relative
        }
        .narrative-text {
            font-family: var(--font-serif);
            font-size: calc(1.05rem * var(--font-scale));
            line-height: 2;
            color: var(--text-secondary);
            letter-spacing: .015em;
        }
        .choice-btn {
            display: flex;
            align-items: flex-start;
            gap: .6rem;
            width: 100%;
            text-align: left;
            padding: .9rem 1.2rem;
            margin-bottom: .5rem;
            background: var(--bg-input);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: calc(.93rem * var(--font-scale));
            color: var(--text);
            transition: var(--transition);
            letter-spacing: .02em;
            line-height: 1.5;
            position: relative
        }
        .choice-btn:hover {
            border-color: var(--accent);
            background: var(--bg-hover);
            box-shadow: 0 3px 16px rgba(168, 122, 58, .1);
            transform: translateX(3px);
            color: var(--text-heading)
        }
        .choice-number {
            flex-shrink: 0;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--border-light);
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .72rem;
            font-weight: 600;
            margin-top: 1px;
            transition: var(--transition-fast)
        }
        .choice-btn:hover .choice-number {
            background: var(--accent);
            color: #fff
        }
        .phase-tag {
            background: var(--accent-bg);
            color: var(--accent-text);
            padding: .18rem .65rem;
            border-radius: 100px;
            font-size: .75rem;
            letter-spacing: .03em;
            white-space: nowrap;
            font-weight: 500
        }
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: .6rem 1.2rem;
            background: var(--bg-header);
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            margin-bottom: 1rem;
            box-shadow: var(--shadow);
            flex-wrap: wrap;
            gap: .4rem
        }
        .meta-item {
            display: flex;
            align-items: center;
            gap: .3rem;
            font-size: .82rem;
            color: var(--text-light);
            white-space: nowrap
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [playerName, setPlayerName] = useState('');
            const [gameStarted, setGameStarted] = useState(false);
            const [age, setAge] = useState(0);
            const [phase, setPhase] = useState('高中');
            const [narrative, setNarrative] = useState('');

            const handleStart = () => {
                if (playerName.trim()) {
                    setGameStarted(true);
                    setNarrative(`欢迎，${playerName}！你开始了你的人生之旅...`);
                }
            };

            const handleChoice = (choice) => {
                setAge(age + 1);
                setNarrative(`你选择了: ${choice}。\n你现在 ${age + 1} 岁了...`);
            };

            if (!gameStarted) {
                return (
                    <div className="setup-container">
                        <div className="setup-card">
                            <h1>人生模拟</h1>
                            <p className="subtitle">中国科大到生命终章</p>
                            <div className="decor-line" style={{background: 'var(--accent-light)'}}></div>
                            <label>请输入你的名字：</label>
                            <input
                                type="text"
                                value={playerName}
                                onChange={(e) => setPlayerName(e.target.value)}
                                placeholder="输入你的名字"
                                onKeyPress={(e) => e.key === 'Enter' && handleStart()}
                            />
                            <button className="btn-primary" onClick={handleStart}>
                                开始游戏
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="game-container">
                    <div className="top-bar">
                        <div className="meta-item">
                            <span>玩家: {playerName}</span>
                        </div>
                        <div className="phase-tag">{phase}</div>
                        <div className="meta-item">
                            <span>年龄: {age}</span>
                        </div>
                    </div>

                    <div className="narrative-card">
                        <div className="narrative-text">
                            {narrative || '准备好面对人生的选择...'}
                        </div>
                    </div>

                    <div style={{marginTop: '1.5rem'}}>
                        <h3 style={{color: 'var(--text-light)', marginBottom: '1rem', fontSize: '0.9rem'}}>做出选择：</h3>
                        <button className="choice-btn" onClick={() => handleChoice('努力学习')}>
                            <span className="choice-number">1</span>
                            <span>努力学习，为未来做准备</span>
                        </button>
                        <button className="choice-btn" onClick={() => handleChoice('享受生活')}>
                            <span className="choice-number">2</span>
                            <span>享受当下，放松自己</span>
                        </button>
                        <button className="choice-btn" onClick={() => handleChoice('帮助他人')}>
                            <span className="choice-number">3</span>
                            <span>帮助他人，积累经验</span>
                        </button>
                        <button 
                            className="choice-btn" 
                            onClick={() => {
                                setGameStarted(false);
                                setPlayerName('');
                                setAge(0);
                                setNarrative('');
                            }}
                            style={{marginTop: '1rem', background: 'var(--danger-bg)', borderColor: 'var(--danger)'}}
                        >
                            <span className="choice-number" style={{background: 'var(--danger)', color: '#fff'}}>R</span>
                            <span style={{color: 'var(--danger)'}}>重新开始</span>
                        </button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
