<!DOCTYPE html>
<html lang="zh-CN" data-theme="light" data-font-scale="1">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人生模拟 · 中国科大到生命终章</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js">
    </script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js">
    </script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js">
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js">
    </script>
    <style>
        :root {
            --font-scale: 1;
            --bg: #fdf8f0;
            --bg-secondary: #faf3e6;
            --bg-card: #fffdf8;
            --bg-header: #fef9f3;
            --bg-modal: #fffefb;
            --bg-input: #fffdf7;
            --bg-hover: #fefaf2;
            --bg-overlay: rgba(60, 40, 20, 0.35);
            --text: #3d3228;
            --text-secondary: #5a4a38;
            --text-light: #6b5e51;
            --text-muted: #9b8c7b;
            --text-heading: #4a3520;
            --accent: #c4944c;
            --accent-hover: #a87a3a;
            --accent-light: #f0e0c8;
            --accent-bg: #fdf0db;
            --accent-text: #8b6914;
            --border: #e8dcc8;
            --border-light: #f0e8d8;
            --border-focus: #c4944c;
            --shadow: 0 2px 12px rgba(60, 40, 20, 0.06);
            --shadow-sm: 0 1px 4px rgba(60, 40, 20, 0.04);
            --shadow-md: 0 4px 20px rgba(60, 40, 20, 0.08);
            --shadow-lg: 0 8px 32px rgba(60, 40, 20, 0.10);
            --shadow-xl: 0 16px 48px rgba(60, 40, 20, 0.14);
            --radius: 14px;
            --radius-sm: 8px;
            --radius-xs: 5px;
            --font-serif: 'Georgia', 'Noto Serif SC', 'STSong', 'SimSun', 'Songti SC', serif;
            --font-sans: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            --danger: #c44a4a;
            --danger-hover: #a83333;
            --danger-bg: #fef5f5;
            --danger-border: #f5d5d5;
            --success: #5a9e6f;
            --success-bg: #f2f9f4;
            --warning: #d4a85c;
            --warning-bg: #fef9f2;
            --scrollbar-thumb: #dcc8a8;
            --scrollbar-thumb-hover: #c4a880;
            --scrollbar-track: transparent;
            --divider: linear-gradient(90deg, transparent, #f0e8d8, transparent);
            --progress-completed: #5a9e6f;
            --progress-current: #c4944c;
            --progress-upcoming: #d5ccbc;
            /* radar-chart specific */
            --radar-grid: #e8dcc8;
            --radar-grid-bg: #fdf8f0;
            --radar-fill: rgba(196, 148, 76, 0.18);
            --radar-stroke: #c4944c;
            --radar-dot: #c4944c;
            --radar-dot-border: #fffdf8;
            --radar-label: #6b5e51;
            --radar-axis: #e8dcc8;
            /* relationship bar colors */
            --rel-father: #c4944c;
            --rel-mother: #d4849c;
            --rel-partner: #c46a6a;
            --rel-friends: #6a9fd4;
            --rel-children: #7ab88a;
        }
        [data-theme="dark"] {
            --bg: #1a1510;
            --bg-secondary: #151210;
            --bg-card: #1e1812;
            --bg-header: #1c1610;
            --bg-modal: #221c15;
            --bg-input: #241d15;
            --bg-hover: #282018;
            --bg-overlay: rgba(8, 6, 4, 0.68);
            --text: #d4c8b8;
            --text-secondary: #c4b8a8;
            --text-light: #b0a494;
            --text-muted: #8a7c6c;
            --text-heading: #d8ccbc;
            --accent: #d4a85c;
            --accent-hover: #c49848;
            --accent-light: #3a2e1c;
            --accent-bg: #3a2e1c;
            --accent-text: #d4a85c;
            --border: #3a3028;
            --border-light: #322a22;
            --border-focus: #d4a85c;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.28);
            --shadow-sm: 0 1px 4px rgba(0, 0, 0, 0.30);
            --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.34);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.38);
            --shadow-xl: 0 16px 48px rgba(0, 0, 0, 0.44);
            --danger: #d46a6a;
            --danger-hover: #c44a4a;
            --danger-bg: #2a1818;
            --danger-border: #4a2828;
            --success: #7ab88a;
            --success-bg: #1a2a1e;
            --warning: #d4a85c;
            --warning-bg: #2a2418;
            --scrollbar-thumb: #4a3a2a;
            --scrollbar-thumb-hover: #5a4a38;
            --divider: linear-gradient(90deg, transparent, #3a3028, transparent);
            --progress-completed: #7ab88a;
            --progress-current: #d4a85c;
            --progress-upcoming: #4a4038;
            --radar-grid: #3a3028;
            --radar-grid-bg: #1e1812;
            --radar-fill: rgba(212, 168, 92, 0.22);
            --radar-stroke: #d4a85c;
            --radar-dot: #d4a85c;
            --radar-dot-border: #1a1510;
            --radar-label: #b0a494;
            --radar-axis: #3a3028;
            --rel-father: #d4a85c;
            --rel-mother: #d4849c;
            --rel-partner: #d46a6a;
            --rel-friends: #6a9fd4;
            --rel-children: #7ab88a;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }
        html {
            scroll-behavior: smooth
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-sans);
            line-height: 1.7;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            transition: background .4s ease, color .4s ease;
            font-size: calc(1rem * var(--font-scale))
        }
        #root {
            min-height: 100vh;
            display: flex;
            flex-direction: column
        }
        ::-webkit-scrollbar {
            width: 6px
        }
        ::-webkit-scrollbar-track {
            background: var(--scrollbar-track)
        }
        ::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 3px
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--scrollbar-thumb-hover)
        }
        button {
            font-family: var(--font-sans);
            cursor: pointer;
            border: none;
            background: none;
            transition: var(--transition-fast);
            font-size: inherit
        }
        button:disabled {
            opacity: .5;
            cursor: not-allowed;
            pointer-events: none
        }
        input,
        textarea,
        select {
            font-family: var(--font-sans);
            transition: var(--transition-fast);
            font-size: inherit
        }
        a {
            color: var(--accent);
            text-decoration: none
        }
        a:hover {
            text-decoration: underline
        }

        .setup-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            background: linear-gradient(180deg, var(--bg) 0%, var(--bg-secondary) 50%, var(--bg) 100%)
        }
        .setup-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 3rem 2.5rem;
            max-width: 560px;
            width: 100%;
            box-shadow: var(--shadow-lg);
            text-align: center;
            position: relative
        }
        .setup-card h1 {
            font-family: var(--font-serif);
            font-size: 1.8rem;
            color: var(--text-heading);
            margin-bottom: .5rem;
            letter-spacing: .04em;
            font-weight: 400
        }
        .setup-card .subtitle {
            color: var(--text-muted);
            font-size: .95rem;
            margin-bottom: 2rem;
            font-style: italic
        }
        .setup-card .decor-line {
            width: 60px;
            height: 2px;
            background: var(--accent-light);
            margin: 0 auto 1.5rem;
            border-radius: 2px
        }
        .setup-card label {
            display: block;
            text-align: left;
            font-size: .85rem;
            color: var(--text-light);
            margin-bottom: .4rem;
            letter-spacing: .02em
        }
        .setup-card input {
            width: 100%;
            padding: .85rem 1rem;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: .95rem;
            background: var(--bg-input);
            color: var(--text);
            letter-spacing: .01em
        }
        .setup-card input:focus {
            outline: none;
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(196, 148, 76, .12);
            background: var(--bg-card)
        }

        .resume-card {
            border: 2px solid var(--accent);
            border-radius: var(--radius-sm);
            padding: 1.2rem;
            margin-bottom: 1.2rem;
            background: var(--accent-bg);
            text-align: left;
            cursor: pointer;
            transition: var(--transition)
        }
        .resume-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-1px)
        }
        .resume-card .resume-title {
            font-weight: 600;
            color: var(--accent-text);
            margin-bottom: .5rem;
            font-size: .9rem;
            letter-spacing: .03em
        }
        .resume-card .resume-info {
            font-size: .8rem;
            color: var(--text-light);
            display: flex;
            flex-wrap: wrap;
            gap: .6rem
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: .4rem;
            padding: .85rem 1.6rem;
            background: var(--accent);
            color: #fffdf7;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            letter-spacing: .04em;
            font-weight: 500;
            transition: var(--transition)
        }
        .btn-primary:hover {
            background: var(--accent-hover);
            box-shadow: 0 4px 16px rgba(168, 122, 58, .3);
            transform: translateY(-1px)
        }
        .btn-primary:active {
            transform: translateY(0)
        }
        .btn-secondary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: .35rem;
            padding: .7rem 1.3rem;
            background: transparent;
            color: var(--accent);
            border: 1.5px solid var(--accent);
            border-radius: var(--radius-sm);
            cursor: pointer;
            letter-spacing: .03em;
            transition: var(--transition)
        }
        .btn-secondary:hover {
            background: var(--accent);
            color: #fffdf7;
            box-shadow: 0 4px 14px rgba(168, 122, 58, .2)
        }
        .btn-danger {
            display: inline-flex;
            align-items: center;
            gap: .35rem;
            padding: .55rem 1rem;
            background: transparent;
            color: var(--danger);
            border: 1.5px solid var(--danger);
            border-radius: var(--radius-xs);
            cursor: pointer;
            letter-spacing: .02em;
            transition: var(--transition)
        }
        .btn-danger:hover {
            background: var(--danger);
            color: #fff;
            box-shadow: 0 4px 14px rgba(196, 74, 74, .2)
        }
        .btn-ghost {
            display: inline-flex;
            align-items: center;
            gap: .3rem;
            padding: .5rem .9rem;
            background: transparent;
            color: var(--text-light);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-xs);
            cursor: pointer;
            letter-spacing: .02em;
            transition: var(--transition)
        }
        .btn-ghost:hover {
            background: var(--bg-hover);
            border-color: var(--border);
            color: var(--text)
        }
        .btn-sm {
            padding: .35rem .65rem;
            font-size: .75rem
        }

        .game-container {
            max-width: 820px;
            margin: 0 auto;
            padding: .8rem 1.2rem 3rem;
            width: 100%
        }
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: .6rem 1.2rem;
            background: var(--bg-header);
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            margin-bottom: .5rem;
            box-shadow: var(--shadow);
            flex-wrap: wrap;
            gap: .4rem
        }
        .top-bar .meta-group {
            display: flex;
            align-items: center;
            gap: .8rem;
            flex-wrap: wrap
        }
        .top-bar .meta-item {
            display: flex;
            align-items: center;
            gap: .3rem;
            font-size: .82rem;
            color: var(--text-light);
            white-space: nowrap
        }
        .phase-tag {
            background: var(--accent-bg);
            color: var(--accent-text);
            padding: .18rem .65rem;
            border-radius: 100px;
            font-size: .75rem;
            letter-spacing: .03em;
            white-space: nowrap;
            font-weight: 500
        }
        .counter-badge {
            background: var(--bg-secondary);
            color: var(--text-light);
            padding: .18rem .65rem;
            border-radius: 100px;
            font-size: .75rem;
            letter-spacing: .03em;
            white-space: nowrap
        }

        .age-progress-wrap {
            display: flex;
            align-items: center;
            gap: .5rem;
            margin-bottom: .6rem;
            padding: 0 .2rem
        }
        .age-progress-wrap .age-label {
            font-size: .7rem;
            color: var(--text-muted);
            white-space: nowrap;
            min-width: 32px;
            text-align: center
        }
        .age-progress-bar {
            flex: 1;
            height: 6px;
            background: var(--border-light);
            border-radius: 3px;
            overflow: hidden;
            position: relative
        }
        .age-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--progress-completed));
            border-radius: 3px;
            transition: width .6s ease
        }
        .age-progress-marker {
            position: absolute;
            top: -4px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--accent);
            border: 2px solid var(--bg-card);
            box-shadow: var(--shadow-sm);
            transform: translateX(-50%);
            transition: left .6s ease
        }

        .tool-bar {
            display: flex;
            align-items: center;
            gap: .4rem;
            padding: .4rem 0;
            margin-bottom: .5rem;
            flex-wrap: wrap;
            justify-content: flex-end
        }
        .tool-btn {
            display: inline-flex;
            align-items: center;
            gap: .25rem;
            padding: .35rem .65rem;
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-xs);
            font-size: .75rem;
            color: var(--text-light);
            cursor: pointer;
            letter-spacing: .02em;
            transition: var(--transition-fast);
            white-space: nowrap;
            position: relative
        }
        .tool-btn:hover {
            background: var(--bg-hover);
            border-color: var(--border);
            color: var(--text)
        }
        .tool-btn .shortcut-hint {
            font-size: .6rem;
            color: var(--text-muted);
            background: var(--bg-secondary);
            padding: 1px 5px;
            border-radius: 3px;
            margin-left: 2px
        }

        .progress-bar-container {
            display: flex;
            align-items: center;
            gap: 0;
            margin-bottom: .8rem;
            padding: .5rem .8rem;
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-sm);
            overflow-x: auto;
            white-space: nowrap;
            flex-wrap: nowrap;
            -webkit-overflow-scrolling: touch
        }
        .progress-phase {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-shrink: 0;
            cursor: pointer;
            transition: var(--transition-fast);
            padding: 2px 4px;
            border-radius: var(--radius-xs)
        }
        .progress-phase:hover {
            background: var(--bg-hover)
        }
        .progress-dot {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .6rem;
            flex-shrink: 0;
            transition: var(--transition);
            font-weight: 700
        }
        .progress-dot.completed {
            background: var(--progress-completed);
            color: #fff
        }
        .progress-dot.current {
            background: var(--progress-current);
            color: #fff;
            animation: pulse-dot 2.2s infinite;
            box-shadow: 0 0 0 4px rgba(196, 148, 76, .25)
        }
        .progress-dot.upcoming {
            background: var(--progress-upcoming);
            color: var(--text-muted)
        }
        @keyframes pulse-dot {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(196, 148, 76, .4)
            }
            50% {
                box-shadow: 0 0 0 10px rgba(196, 148, 76, 0)
            }
        }
        .progress-line {
            width: 18px;
            height: 2px;
            background: var(--border);
            flex-shrink: 0;
            margin: 0 1px 14px
        }
        .progress-line.completed {
            background: var(--progress-completed)
        }
        .progress-label {
            font-size: .55rem;
            color: var(--text-muted);
            text-align: center;
            margin-top: 1px;
            max-width: 40px;
            word-break: keep-all;
            flex-shrink: 0;
            line-height: 1.2
        }

        .narrative-card {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            padding: 2rem;
            margin-bottom: 1.2rem;
            box-shadow: var(--shadow);
            min-height: 180px;
            position: relative
        }
        .narrative-card .narrative-text {
            font-family: var(--font-serif);
            font-size: calc(1.05rem * var(--font-scale));
            line-height: 2;
            color: var(--text-secondary);
            letter-spacing: .015em;
            white-space: pre-line;
            word-break: break-word
        }
        .milestone-badge {
            display: inline-block;
            background: var(--accent-bg);
            color: var(--accent-text);
            padding: .15rem .7rem;
            border-radius: 100px;
            font-size: .73rem;
            letter-spacing: .04em;
            margin-bottom: .8rem
        }
        .end-badge {
            display: inline-block;
            background: var(--danger-bg);
            color: var(--danger);
            padding: .2rem .8rem;
            border-radius: 100px;
            font-size: .76rem;
            letter-spacing: .05em;
            margin-bottom: .8rem
        }
        .soft-divider {
            height: 1px;
            background: var(--divider);
            margin: 1.2rem 0;
            border: none
        }
        .choices-section {
            margin-top: .5rem
        }
        .choices-header {
            font-size: .78rem;
            color: var(--text-muted);
            letter-spacing: .05em;
            margin-bottom: .7rem;
            text-align: center
        }
        .choice-btn {
            display: flex;
            align-items: flex-start;
            gap: .6rem;
            width: 100%;
            text-align: left;
            padding: .9rem 1.2rem;
            margin-bottom: .5rem;
            background: var(--bg-input);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: calc(.93rem * var(--font-scale));
            color: var(--text);
            transition: var(--transition);
            letter-spacing: .02em;
            line-height: 1.5;
            position: relative
        }
        .choice-btn .choice-number {
            flex-shrink: 0;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--border-light);
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .72rem;
            font-weight: 600;
            margin-top: 1px;
            transition: var(--transition-fast)
        }
        .choice-btn:hover {
            border-color: var(--accent);
            background: var(--bg-hover);
            box-shadow: 0 3px 16px rgba(168, 122, 58, .1);
            transform: translateX(3px);
            color: var(--text-heading)
        }
        .choice-btn:hover .choice-number {
            background: var(--accent);
            color: #fff
        }
        .choice-btn:active {
            transform: translateX(1px);
            transition: .08s
        }

        .token-float {
            position: fixed;
            top: 20%;
            right: 2rem;
            background: var(--bg-card);
            border: 1px solid var(--accent);
            border-radius: var(--radius-sm);
            padding: .5rem .9rem;
            font-size: .78rem;
            color: var(--accent-text);
            box-shadow: var(--shadow-md);
            z-index: 80;
            pointer-events: none;
            animation: floatUp 2.5s ease-out forwards
        }
        @keyframes floatUp {
            0% {
                opacity: 0;
                transform: translateY(10px)
            }
            15% {
                opacity: 1;
                transform: translateY(0)
            }
            75% {
                opacity: 1;
                transform: translateY(-30px)
            }
            100% {
                opacity: 0;
                transform: translateY(-60px)
            }
        }
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-modal);
            border: 1px solid var(--accent);
            border-radius: var(--radius-sm);
            padding: .6rem 1.3rem;
            font-size: .85rem;
            color: var(--text);
            box-shadow: var(--shadow-lg);
            z-index: 150;
            animation: toastIn .3s ease, toastOut .3s ease 1.7s forwards;
            white-space: nowrap
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px)
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0)
            }
        }
        @keyframes toastOut {
            from {
                opacity: 1
            }
            to {
                opacity: 0;
                transform: translateX(-50%) translateY(20px)
            }
        }
        .cost-warning-banner {
            background: var(--warning-bg);
            border: 1px solid var(--warning);
            border-radius: var(--radius-sm);

        const PHASE_SHORT = { freshman: '大一', college: '大学', graduation: '毕业', early_career: '职场', marriage: '婚姻',
            midlife: '中年', parents_aging: '父母', retirement: '退休', twilight: '暮年' };

        // ═══════════════ 游戏状态 ═══════════════
        const DEFAULT_GS = {

        const STATE_RULES = {
            workaholic: { stress: 15, happiness: -10, ambition: 12, health: -5, loneliness: 5 },
            family_time: { happiness: 15, stress: -10, ambition: -5, loneliness: -8 },

        function gsReducer(state, action) {

                case 'APPLY': {

                    const a = action.payload.archetype;
                    const c = action.payload.customEffects;
